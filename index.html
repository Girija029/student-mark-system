<!DOCTYPE html>
<html lang="en">

<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold">🎓 KCE ERP Dashboard</a>
            <div>
                <a href="/admin" class="btn btn-warning btn-sm fw-bold">⚙️ Admin Panel</a>
                <a href="/logout" class="btn btn-danger btn-sm ms-2">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white fw-bold">✏️ Marks Entry</div>
                    <div class="card-body">
                        <form action="/enter_marks" method="GET">
                            <div class="mb-2">
                                <label>Class</label>
                                <select name="class_name" id="classSelect" class="form-select" required>
                                    <option value="" disabled selected>Choose...</option>
                                    {% for c in classes %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
                                </select>
                            </div>
                            <div class="mb-2">
                                <label>Exam</label>
                                <select name="exam" class="form-select" required>
                                    {% for e in exams %}<option value="{{ e }}">{{ e }}</option>{% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Subject</label>
                                <select name="subject" id="subjectSelect" class="form-select" required>
                                    <option value="">Select Class First</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Go to Entry</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-success text-white fw-bold">📊 Cumulative Report</div>
                    <div class="card-body">
                        <form action="/report" method="GET">
                            <div class="mb-2">
                                <label>Class</label>
                                <select name="class_name" class="form-select" required>
                                    {% for c in classes %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Exam</label>
                                <select name="exam" class="form-select" required>
                                    {% for e in exams %}<option value="{{ e }}">{{ e }}</option>{% endfor %}
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">View Cumulative Report</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-info text-white fw-bold">📈 Subject-wise Analysis</div>
                    <div class="card-body">
                        <form action="/subject_analysis" method="GET">
                            <div class="row">
                                <div class="col-md-4 mb-2">
                                    <label>Class</label>
                                    <select name="class_name" class="form-select" required>
                                        {% for c in classes %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-4 mb-2">
                                    <label>Exam</label>
                                    <select name="exam" class="form-select" required>
                                        {% for e in exams %}<option value="{{ e }}">{{ e }}</option>{% endfor %}
                                    </select>
                                </div>
                                <div class="col-md-4 mb-2">
                                    <label>Subject</label>
                                    <select name="subject" class="form-select" required>
                                        <option value="">Select Subject</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-info w-100 mt-2">View Subject Analysis</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const subjectMap = {{ class_subject_map | safe }};
        const classSelect = document.getElementById('classSelect');
        const subjectSelect = document.getElementById('subjectSelect');

        // For marks entry form
        if (classSelect) {
            classSelect.addEventListener('change', function () {
                const subjects = subjectMap[this.value] || [];
                subjectSelect.innerHTML = subjects.length ?
                    subjects.map(s => `<option value="${s}">${s}</option>`).join('') :
                    '<option value="">No Subjects</option>';
            });
        }

        // For subject analysis form (multiple selects)
        const analysisClassSelect = document.querySelector('form[action="/subject_analysis"] select[name="class_name"]');
        const analysisSubjectSelect = document.querySelector('form[action="/subject_analysis"] select[name="subject"]');

        if (analysisClassSelect) {
            analysisClassSelect.addEventListener('change', function () {
                const subjects = subjectMap[this.value] || [];
                analysisSubjectSelect.innerHTML = subjects.length ?
                    '<option value="">Select Subject</option>' + subjects.map(s => `<option value="${s}">${s}</option>`).join('') :
                    '<option value="">No Subjects</option>';
            });
            // Trigger initial load
            analysisClassSelect.dispatchEvent(new Event('change'));
        }
    </script>
</body>

</html>
