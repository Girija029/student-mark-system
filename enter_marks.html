<!DOCTYPE html>
<html lang="en">

<head>
    <title>Enter Marks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white pb-0">
                <h4 class="text-primary fw-bold">📝 Data Entry</h4>
                <p class="text-muted">{{ class_name }} | {{ exam }} | <b>{{ subject }}</b></p>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">📅 Exam Date</label>
                        <input type="date" name="exam_date" class="form-control" style="width: auto;"
                            value="{{ existing_date }}">
                        <small class="text-muted">Set the date when this exam was conducted</small>
                    </div>

                    <table class="table table-hover table-bordered align-middle mt-3">
                        <thead class="table-dark">
                            <tr>
                                <th width="15%">Roll No</th>
                                <th>Student Name</th>
                                <th width="20%">Mark (Type 'AB' for Absent)</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for student in students %}
                            <tr>
                                <td class="fw-bold">{{ student[1] }}</td>
                                <td>{{ student[2] }}</td>
                                <td>
                                    <input type="text" name="{{ student[0] }}" class="form-control text-center fw-bold"
                                        autocomplete="off" value="{{ existing_marks[student[0]] }}">
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                    <div class="d-flex justify-content-between mt-4">
                        <a href="/dashboard" class="btn btn-outline-secondary">← Cancel</a>
                        <button type="submit" class="btn btn-success px-5 fw-bold">💾 Save Marks to Database</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
